<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Conclave Check-In</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>

        if(
            localStorage.getItem(
                "loggedIn"
            ) !== "true"
        ){

            window.location =
                "/login.html";
        }

    </script>

</head>

<body>

<nav>

    <a href="dashboard.html">Dashboard</a>

    <a href="index.html">Check-In</a>

    <button
            class="logout-btn"
            onclick="logout()">

        Logout

    </button>

</nav>

<h1>Conclave Check-In</h1>

<input
        id="search"
        placeholder="Search Name / Email / Mobile"
        onkeyup="searchAttendee()"
>

<div id="searchResults"></div>

<hr>

<h2>QR Scanner</h2>

<div id="reader"></div>

<button
        id="scanAgainBtn"
        onclick="startScanner()"
        style="display:none;">

    Scan Another QR

</button>

<hr>

<div id="attendeeCard"></div>

<script src="script.js"></script>

<script>

    startScanner();

</script>

</body>

</html>
